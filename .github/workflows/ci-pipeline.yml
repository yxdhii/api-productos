name: Integracion Continua SmartInventory
# El pipeline se activará solo cuando alguien intente hacer un Pull Request
on:
pull_request:
branches: [ "develop", "main" ]
jobs:
build-and-test:
runs-on: ubuntu-latest
steps:
- name: 1. Descargar Codigo Fuente
uses: actions/checkout@v3
- name: 2. Configurar Entorno Java 25
uses: actions/setup-java@v3
with:
java-version: '25'
distribution: 'temurin'
- name: 3. Compilacion y Pruebas Unitarias (JaCoCo Coverage)
run: mvn clean verify
- name: 4. Analisis de Calidad de Codigo (SonarCloud)
env:
GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
run: mvn sonar:sonar
- name: 5. Analisis de Seguridad de Dependencias (Snyk SAST)
uses: snyk/actions/maven@master
env:
SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
with:
args: --severity-threshold=high
- name: 6. Empaquetado: Construir Imagen Docker
run: docker build -t ${{ secrets.DOCKER_USERNAME }}/api-
productos:latest .
- name: 7. Escaneo de Vulnerabilidades de Sistema Operativo (Trivy)
uses: aquasecurity/trivy-action@master
with:
image-ref: '${{ secrets.DOCKER_USERNAME }}/api-productos:latest'
format: 'table'
exit-code: '1' # Un exit-code 1 significa que el Pipeline
ABORTARÁ si hay fallos
severity: 'CRITICAL,HIGH'
- name: 8. Despliegue: Subir contenedor a Docker Hub
run: |
docker login -u ${{ secrets.DOCKER_USERNAME }} -p $
{{ secrets.DOCKER_PASSWORD }}
docker push ${{ secrets.DOCKER_USERNAME }}/api-productos:latest
